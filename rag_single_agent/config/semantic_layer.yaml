## Semantic Layer — BIRD Multi-Database Text-to-SQL
##
## This file is a PLACEHOLDER. In the BIRD multi-database architecture,
## the banking-specific semantic layer has been replaced by:
##
## 1. BIRD Evidence: Per-question domain hints from the BIRD dataset
##    (e.g., "num_sales < 0.1 means less than 10000")
##    Injected directly into the prompt via {evidence} placeholder.
##
## 2. Per-database schema: DDL from BIRD databases loaded dynamically
##    per db_id, not a fixed set of metrics/aliases.
##
## The old banking metrics (doanh_thu, refund_rate, etc.), table aliases,
## sensitive columns, enums, and business rules have been removed because
## they are specific to the banking/POS schema and do not apply to BIRD's
## 70+ diverse databases.
##
## If you need domain-specific semantic enrichment for a particular BIRD
## database, add it as evidence in the evaluation pipeline rather than here.

metrics: {}
aliases: {}
sensitive_columns: []
